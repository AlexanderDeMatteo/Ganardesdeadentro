name: fittrack

services:
  fittrack-frontend:
    container_name: fittrack-frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      # Dev: sincroniza código local (admin-v2, componentes, estilos) sin rebuild completo
      - .:/app
      - fittrack_frontend_node_modules:/app/node_modules
      - fittrack_frontend_next:/app/.next
    environment:
      # HMR en Windows + bind mount (OneDrive/Docker)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Piloto híbrido: auth + métricas + rutinas + users/nutrition/memberships vía API
      # Con AUTH_SOURCE=api, athleteId === user.id del JWT (no usar IDs del seed demo)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000}
      NEXT_PUBLIC_AUTH_SOURCE: api
      NEXT_PUBLIC_DATA_SOURCE: api
      NEXT_PUBLIC_DATA_SOURCE_METRICS: api
      NEXT_PUBLIC_DATA_SOURCE_ROUTINES: api
      NEXT_PUBLIC_DATA_SOURCE_USERS: api
      NEXT_PUBLIC_DATA_SOURCE_NUTRITION: api
      NEXT_PUBLIC_DATA_SOURCE_MEMBERSHIPS: api
      # Server-side (Titan guard → Flask /api/auth/me); browser sigue usando localhost:5000
      API_INTERNAL_URL: http://fittrack-backend:5000
      # Ollama en el host (Windows/Mac: host.docker.internal)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      TITAN_RATELIMIT_REDIS_URL: redis://fittrack-redis:6379
    depends_on:
      fittrack-backend:
        condition: service_healthy
      fittrack-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  fittrack-backend:
    container_name: fittrack-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: development
      FLASK_ENV: development
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DATABASE_URL: sqlite:////data/fitness_platform.db
      # CORS_ORIGINS y FRONTEND_URL: definir en backend/.env (tunnel o localhost)
      EXERCISEDB_API_URL: https://oss.exercisedb.dev
      # Docker Desktop en Windows puede fallar verificación SSL hacia APIs externas
      EXERCISEDB_SSL_VERIFY: "false"
      RATELIMIT_STORAGE_URI: redis://fittrack-redis:6379
    ports:
      - "5000:5000"
    volumes:
      # Dev: sincroniza código de la app sin pisar entrypoint/deps de la imagen
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - fittrack_backend_data:/data
    depends_on:
      fittrack-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  fittrack-redis:
    container_name: fittrack-redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - fittrack_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  fittrack_backend_data:
    name: fittrack_backend_data
  fittrack_frontend_node_modules:
    name: fittrack_frontend_node_modules
  fittrack_frontend_next:
    name: fittrack_frontend_next
  fittrack_redis_data:
    name: fittrack_redis_data
